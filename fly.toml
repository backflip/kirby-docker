# fly.toml app configuration file generated for kirby-docker on 2026-06-15T13:39:09+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'kirby-docker'
primary_region = 'fra'

[build]

[mounts]
  source = "kirby_docker_data"
  destination = "/var/www/html/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
